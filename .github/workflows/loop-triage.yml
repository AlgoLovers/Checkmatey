# LOOP-2 · Daily Triage — 루프 엔지니어링 L1 (보고 전용)
#
# 지금은 수동 실행(workflow_dispatch)만 켜져 있어 자동 실패가 나지 않는다.
# 스케줄로 돌리려면:
#   1) 저장소 시크릿에 ANTHROPIC_API_KEY(또는 OAuth 토큰)를 추가하고
#   2) 아래 schedule 주석을 해제한다.
# anthropics/claude-code-action 의 입력 이름은 사용하는 액션 버전에 맞게 확인할 것.
name: "Loop · Daily Triage (L1, report-only)"

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: '0 0 * * *'   # 매일 00:00 UTC

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    # 시크릿이 없으면 자동 실행에서도 조용히 건너뛴다.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v7

      - name: Run Claude Code triage (read-only)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            LOOP-2 (Daily Triage, L1) 실행. 읽기 전용.
            - 새 이슈 / 실패한 CI / 스테일 브랜치를 요약한다.
            - 라벨을 "제안"만 한다(자동 적용 금지).
            - STATE.md 의 "최근 루프 런 요약"에 항목 추가를 제안한다.
            - 코드는 수정하지 않는다. 자동 머지 금지. (loop-constraints.md 준수)
